{id:"overview",title:"DPG Overview",phase:null,color:"#333",
 content:`
 <h2 id="overview">What is the Data Product Generator?</h2>
    <p>The DPG enables extracting data from BW InfoProviders (aDSOs, CompositeProvider, InfoObjects, MultiProvider, InfoCubes, Queries) via the <strong>ODP-Framework</strong> in <strong>Local Tables (File)</strong> in the SAP Datasphere Object Store. These Local Tables can then be published as <strong>Data Products</strong> and shared, e.g., to SAP Databricks.</p>
    <p style="margin-top:0.5rem"><strong>Core concept:</strong> A <em>Data Subscription</em> defines WHAT (source, fields, filters) and WHERE TO (target/space in Datasphere) to extract — it does not contain the data itself, only the extraction definition.</p>
    <span class="source-tag">Source: SAP Help – "Data Subscription (DSUB and SUBS)"</span>
	`},
{id:"toolcomp",title:"Tool Comparison",phase:null,color:"#333",
 content:`
 <h2 id="toolcomp">🔧 Administration Tool Comparison</h2>
    <p style="margin-bottom:0.7rem">Data Subscriptions can be managed through various tools. For BW 7.5, the <strong>Transaction RSDPS</strong> (SAP GUI) and the <strong>BW Modeling Tools</strong> (Eclipse) are available. The Data Subscriptions App in the BW/4HANA Cockpit is only available from BW/4HANA and is listed here for completeness.</p>
    <table class="data">
      <tr>
        <th>Action</th>
        <th>RSDPS<br><span style="font-weight:400;font-size:0.75rem">SAP GUI</span></th>
        <th>BWMT Data Subscriptions<br><span style="font-weight:400;font-size:0.75rem">Eclipse</span></th>
        <th>BWMT Scenario Generator<br><span style="font-weight:400;font-size:0.75rem">Eclipse</span></th>
        <th class="col-disabled">Data Subscriptions App<br><span style="font-weight:400;font-size:0.75rem">BW/4HANA Cockpit<br>⛔ not for BW 7.5</span></th>
      </tr>
      <tr><td><strong>Create</strong></td><td>✅</td><td>❌</td><td>✅ Mass-Generate</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Create from Template</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Edit</strong> (Extraction Mode, Selection, Projection, Scheduling)</td><td>✅</td><td>❌</td><td>⚠️ Before Generate only</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Activate / Deactivate</strong></td><td>✅ (single)</td><td>✅ (incl. mass)</td><td>✅ (during Generate)</td><td class="col-disabled">✅ (single)</td></tr>
      <tr><td><strong>Run</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Delete</strong></td><td>✅ (single)</td><td>✅ (incl. mass)</td><td>✅ (incl. mass)</td><td class="col-disabled">✅ (single)</td></tr>
      <tr><td><strong>Check</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Runtime / Browse</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅ (View Executions)</td></tr>
      <tr><td><strong>Reset Delta</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Data Preview</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Mass Delete by Target</strong></td><td>✅ (via Report)</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Maintain Target System</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>View Local Table (File)</strong></td><td>✅</td><td>✅ (CTRL+Click)</td><td>❌</td><td class="col-disabled">✅</td></tr>
    </table>
    <div class="callout callout-warn" style="margin-top:0.8rem">
      <strong>⚠️ Summary for BW 7.5:</strong> For editing existing subscriptions (Edit) and for <strong>Execute (Run)</strong> requires <strong>Transaction <code>RSDPS</code></strong> . BWMT additionally offers mass operations (Activate, Delete) and the <strong>Scenario Generator</strong> for initial generation of complex models.
    </div>
    <span class="source-tag">Source: SAP Help – "RSDPS Transaction in SAP GUI only only", "BW Data Product Generator Perspective in BW Modeling Tools (BWMT)", "Data Subscriptions App in SAP BW/4HANA Cockpit"; own consolidation</span>
	`},
{id:"s01",title:"0.1 Check System Landscape",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`<span class="badge badge-pflicht">Required</span>
      </div>
      <div class="step-goal">Goal: Ensure that the technical foandation is in place.</div>
      <ul>
        <li>SAP BW 7.5 with <strong>at least SP24</strong></li>
        <li>The BW system must be operated as <strong>SAP Business Warehouse, private cloud edition (BWPCE)</strong> in SAP Business Data Cloud be operated</li>
        <li>SAP Datasphere with <strong>activated Object Store</strong> must be available</li>
        <li>Connectivity between BW and Datasphere must be established</li>
      </ul>
      <div class="callout callout-warn">
        <strong>⚠️ Language Restriction:</strong> Der Data Product Generator and alle TCIs sind <strong>ausschließlich in Englisch</strong> available. Die Anmeldung at BW-System must on Englisch erfolgen (<code>Language = EN</code>). Logging on in any other language may result in unexpected errors and malfunctioning behavior.<br>
        <span class="source-tag">Source: SAP Note 3590400 – "Configuring the Data Product Generator", Section "Install the Main TCI"</span>
      </div>
      <div class="callout callout-danger">
        <strong>⚠️ License Restriction:</strong> The DPG is only licensed for BW systems operated as BWPCE in SAP Private Cloud – <strong>not</strong> for standalone on-premise installations.<br>
        <span class="source-tag">Source: Blog "The SAP BW DPG for SAP BDC"</span>
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Open Point:</strong> Whether exceptions exist for on-premise could not be confirmed. The blog "BW DPG to Databricks" mentions: <em>"speak to your SAP team for potential options"</em>. <strong>Please clarify internally with SAP.</strong>
		`},
{id:"s02",title:"0.2 Implement SAP Notes",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`<span class="badge badge-pflicht">Required</span>
      </div>
      <div class="step-goal">Goal: Install the DPG code in the BW system.</div>
      <p><strong>Relevant SAP Notes:</strong></p>
      <table class="data">
        <tr><th>Note</th><th>Content</th></tr>
        <tr><td><code>3590400</code></td><td>Configuration guide for the DPG (first step: contains installation guide and note about creating an SAP ticket)</td></tr>
        <tr><td><code>3678407</code></td><td>TCI for Data Subscriptions 3.0 – latest version of the DPG code</td></tr>
        <tr><td><code>3593519</code></td><td>TCI for Data Subscriptions 2.0 – older version (only relevant if 3678407 is not applicable)</td></tr>
        <tr><td><code>3590318</code></td><td>Pilot BW Configuration – released after support case (mandatory)</td></tr>
        <tr><td><code>3581186</code></td><td>OA2C: RFC API (mandatory)</td></tr>
        <tr><td><code>3089413</code></td><td>CVE-2023-0014: Capture-replay vulnerability in SAP NetWeaver AS (mandatory)</td></tr>
        <tr><td><code>3224161</code></td><td>Prerequisite for Note 3089413 (mandatory)</td></tr>
        <tr><td><code>3600085</code></td><td>Note Analyzer for UI5 Corrections (BW/4HANA 2021/2023 only)</td></tr>
      </table>
      <ol>
        <li>Read SAP Note 3590400 as entry point – contains the complete installation guide and the note about creating an SAP ticket</li>
        <li>Check SAP Note 3678407 (Data Subscriptions 3.0) via the <strong>Note Analyzer</strong> and implement all corrections. If not applicable: use SAP Note 3593519 (Data Subscriptions 2.0)</li>
        <li>Note Analyzer for Data Product Generator → all checks must be green</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Warning – Certificates:</strong> SSL certificates must be correctly maintained in <code>STRUST</code> for the connection to Datasphere to work.<br>
        <span class="source-tag">Source: Blog "BW DPG to Databricks"</span>
		`},
{id:"s03",title:"0.3 DPG Configuration",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`
 <span class="badge badge-pflicht">Required</span>
      </div>
      <div class="step-goal">Goal: Establish the connection between BW and SAP Datasphere, create the BW File Space.</div>
      <ol>
        <li>Configuration task <code>SAP_BW_BDC_CONFIGURATION</code> execute (details in SAP Note 3590400)</li>
        <li>This creates an initial <strong>BW File Space</strong> in Datasphere (type: HDLFS)</li>
        <li>Via <code>RSDPS</code> → <strong>Goto → Maintain Target System</strong> can <strong>additional targets</strong> be configured pointing to different spaces. The desired target space is selected when creating a subscription.</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️ Multiple Targets:</strong> The DPG now supports <strong>multiple Datasphere targets and spaces</strong> per BW system, allowing data separation e.g. by business domain. The configuration task is also <strong>repeatable</strong>.<br>
        <span class="source-tag">Source: SAP Architecture Center – "Modernizing SAP BW with SAP BDC" (Feature: "Supporting multiple SAP Datasphere targets and spaces"); Blog "BW DPG to Databricks"</span>
      </div>
      <div class="callout callout-warn">
        <strong>⚠️ BW File Space is read-only:</strong> No custom objects can be created (exception: Task Chains). Data management (e.g. deleting data) is possible. Local Tables can be shared to other spaces via Sharing.<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions"</span>
		`},
{id:"s04",title:"0.4 Configure Target(s)",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`
 <span class="badge badge-pflicht">Required</span>
        <span class="badge badge-tool">RSDPS</span>
      </div>
      <div class="step-goal">Goal: Create at least one target that can be selected for Data Subscriptions.
      <ol>
        <li>Transaction <code>RSDPS</code> → Menu <strong>Goto → Maintain Target System</strong></li>
        <li>Create target (points to BW File Space / Datasphere Tenant)</li>
        <li>Target Type is automatically set to <strong>HDLFS</strong> set</li>
        <li>Optional: Mark a target as <strong>Preferred Target</strong> mark</li>
      </ol>
      <span class="source-tag">Source: SAP Help – "RSDPS Transaction in SAP GUI only only", "Configuring Targets for the Data Product Generator"</span>
	  `},
{id:"s05",title:"0.5 Datasphere Authorizations",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`
 <span class="badge badge-pflicht">Required</span>
      </div>
      <div class="step-goal">Goal: Ensure that users in Datasphere have the required roles.
      <p><strong>Required Scoped Roles (at least one):</strong></p>
      <ul>
        <li><strong>DW Space Administrator</strong> – Benutzerverwaltung &amp; Monitoring</li>
        <li><strong>DW Integrator</strong> – Monitoring data integration in the space</li>
        <li><strong>DW Modeler</strong> – Share local tables to other spaces</li>
      </ul>
      <span class="source-tag">Source: Blog "Expose BW 7.5 objects as Data Products in Databricks"</span>
	  `},
{id:"s06",title:"0.6 BW Authorizations",phase:"Phase 0 – Prerequisites",color:"#e76500",
 content:`
	  <span class="badge badge-pflicht">Required</span>
	  <div class="step-goal">Goal: Ensure that the required authorizations are assigned in the BW system.</div>
      <p><strong>For connectivity setup:</strong></p>
      <ul>
        <li>Authorization Object <strong><code>S_RS_DDSTG</code></strong> for the dialog user</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>For creating Data Subscriptions:</strong></p>
      <ul>
        <li>Authorization Object <strong><code>S_RS_DDS</code></strong> for the dialog user</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>For backgroand runs (Process Chains):</strong></p>
      <ul>
        <li>Authorization Object <strong><code>S_RS_DDS</code></strong> for the BW backgroand user (e.g. BWREMOTE)</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>For OAuth configuration (STRUST, SOAUTH2_CLIENT):</strong></p>
      <table class="data">
        <tr><th>Authorization Object</th><th>Attributee</th><th>Value</th></tr>
        <tr><td><code>S_OA2C_ADM</code></td><td>ACTVT</td><td>01, 02, 03, 06</td></tr>
        <tr><td><code>S_SEC_COMM</code></td><td>ACTVT</td><td>03</td></tr>
        <tr><td><code>S_OA2C_USE</code></td><td>OA2C_PROF</td><td>BW4_DWC</td></tr>
        <tr><td></td><td>ACTVT</td><td>16</td></tr>
        <tr><td><code>S_PSE_ADM</code></td><td>ACTVT</td><td>01</td></tr>
      </table>
      <div class="callout callout-info">
        <strong>ℹ️ BW/4HANA only:</strong> Additionally assign the role <strong><code>SAP_BW4_MODELER_FOR_BDC</code></strong> .
      </div>
      <span class="source-tag">Source: SAP Note 3590400 – "Configuring the Data Product Generator", Section "Authorizations in SAP BW or SAP BW/4HANA"</span>
	  `},
{id:"s11",title:"1.1 Scenario Generator (BWMT)",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
 <span class="badge badge-empfohlen">Recommended</span>
        <span class="badge badge-tool">BWMT / Eclipse</span>
      </div>
      <div class="step-goal">Goal: Map an entire BW model including all dependencies (e.g. InfoObjects of a CompositeProvider) as subscriptions and generate them in one step.</div>
      <p><strong>Prerequisite:</strong> BWMT Version <strong>1.27</strong> (for the BW Data Product Generator Perspective: <strong>1.27.1</strong>)</p>
      <p><strong>Concept:</strong> Ein <em>Scenario</em> = list of references between Data Subscriptions needed to fully represent a BW model. The <em>Scenario Tree</em> stores dependencies and considers existing subscriptions (no duplicates).</p>
      <p><strong>Procedure:</strong></p>
      <ol>
        <li>Eclipse: <strong>Window → Show View → Business Warehouse → Scenario Generator (Data Subscriptions)</strong></li>
        <li>Tab <strong>Scenario Core Objects</strong>: Add BW objects (aDSOs, CompositeProvider, etc.)</li>
        <li><strong>Collection Grouping</strong> select (recommendation: "Only Necessary Objects")</li>
        <li><strong>Association Levels</strong> set (default: 4)</li>
        <li><strong>Target</strong> select (mandatory) and optionally <strong>Process Chain Variant</strong></li>
        <li>Set further options (e.g. "Use Existing Data Subscriptions", "Consider Transport Configuration")</li>
        <li><strong>Collect</strong> click → Scenario Tree is built</li>
        <li>Tab <strong>Object Relations → Selection to Generate Data Subscriptions</strong>: Review and individually adjust subscriptions (Description, Extraction Mode, Selections, Projections, Package)</li>
        <li><strong>Mode</strong> select (recommended: "Activate in Backgroand")</li>
        <li><strong>Generate</strong> click → all subscriptions are created at once</li>
        <li>Review results in the <strong>Messages</strong> tab</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Warning – Same Target:</strong> All subscriptions in a scenario must have <strong>the same target</strong> !
      </div>
	  <div class="callout callout-warn">
        <strong>⚠️ Activation Mode:</strong> "Activate Directly" consumes significant processing power → prefer <strong>"Activate in Backgroand"</strong> select.<br>
        <span class="source-tag">Source: SAP Help – "Generating Data Subscriptions"</span>
      </div>
	  <div class="callout callout-warn">
        <strong>⚠️ Important – Run not possible in BWMT:</strong> After generating, subscriptions must be executed via <strong>Transaction <code>RSDPS</code></strong> (see Phase 2). Execution (Run) is not available in BWMT.<br>
        <span class="source-tag">Source: SAP Help – "Generating Data Subscriptions", "BW Data Product Generator Perspective in BW Modeling Tools (BWMT)"</span>
	  </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Advantages over RSDPS:</strong> Mass generation of all subscriptions including dependencies, mass activation, package assignments for all subscriptions at once, reuse of existing subscriptions.
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Performance Optimization:</strong> For large data volumes, the following RSADMIN parameters can be adjusted via report <code>SAP_RSADMIN_MAINTAIN</code> (SE38) :<br>
        • <code>RSDDS_PACKSIZE_CSV</code> – Package size (default: 50 MB)<br>
        • <code>RSDDS_PARALLEL_LOAD = X</code> – Enable parallel processing (enabled by default from DPG 3.0)<br>
        Data Subscription runs are processed via the Queued Task Manager (QTM), which uses up to 75% of available batch work processes (configurable, see SAP Note 3675751).<br>
        <span class="source-tag">Source: SAP Note 3590400 – "Optimizing Data Subscription Performance"</span>
      </div>      
	  `},
{id:"s12",title:"1.2 Optional Settings",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
 <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">BWMT (before Generate) or RSDPS</span>   
      <div class="step-goal">Goal: Fine-tune the extraction (fields, filters, delta, scheduling).</div>
      <p>These settings can be made <strong>before generating</strong> in the Scenario Generator (Step 1.1, Point 8) or <strong>after creation</strong> in edit mode of Transaction <code>RSDPS</code> :</p>
      <table class="data">
        <tr><th>Setting</th><th>Description</th><th>Note</th></tr>
        <tr><td><strong>Extraction Mode</strong></td><td><code>Full</code> or <code>Delta</code></td><td>Delta = incremental extraction</td></tr>
        <tr><td><strong>Scheduling</strong></td><td><code>No Scheduling</code> (manuell) or <code>Process Chain</code></td><td>For Process Chain: specify variant</td></tr>
        <tr><td><strong>Selections</strong></td><td>Restrict dataset (filter on fields)</td><td>Reduces data volume</td></tr>
        <tr><td><strong>Projections</strong></td><td>Select/deselect fields</td><td>Key fields are always mandatory</td></tr>
      </table>
      <div class="callout callout-danger">
        <strong>⚠️ Critical Time Window for Changes:</strong><br>
        <strong>Before first run:</strong> Description, Extraction Mode, Scheduling, Selection, Projection can be changed.<br>
        <strong>After first run:</strong> Only <strong>Description</strong> remains editable – everything else becomes <strong>read-only</strong>!<br>
        Subsequent changes are <strong>only possible via <code>RSDPS</code></strong> (not in the BWMT Data Subscriptions View).<br>
        <span class="source-tag">Source: SAP Help – "Editing Data Subscriptions"</span>
      </div>
      <div class="callout callout-warn">
        <strong>⚠️ Process Chain Type:</strong> Must be: <strong>Load Process and Postprocessing → Data Provisioning Subscription</strong>.<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions in the SAP GUI"</span>
		`},
{id:"s13",title:"1.3 Manual Creation in RSDPS",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
 <span class="badge badge-optional">Alternative to 1.1</span>
        <span class="badge badge-tool">RSDPS</span>
      </div>
      <div class="step-goal">Goal: Create a single extraction definition for a BW InfoProvider – without the Scenario Generator.</div>
      <p><strong>Procedure in <code>RSDPS</code> (SAP GUI):</strong></p>
      <ol>
        <li>Transaction <code>RSDPS</code> open</li>
        <li>Button <strong>Create</strong> click</li>
        <li><strong>Source Name:</strong> BW InfoProvider select (aDSO, CompositeProvider, InfoObject, MultiProvider, InfoCube or Query) – Source Type is automatically set to <strong>ODP</strong> set</li>
        <li><strong>Target Name:</strong> The configured target select – Target Type is automatically set to <strong>HDLFS</strong> set</li>
        <li><strong>Save</strong> click</li>
        <li><strong>Package</strong> select</li>
      </ol>
      <div class="callout callout-danger">
        <strong>⚠️ Package Warning:</strong> By default, <code>$TMP</code> is assigned (= local, <strong>not transportable</strong>). For productive scenarios, always choose a transportable package!<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions in the SAP GUI"</span>      
      <p><strong>What is automatically generated:</strong></p>
      <ul>
        <li>Technical name (cannot be changed)</li>
        <li>Description (based on InfoProvider, can be changed)</li>
        <li>Timestamp, creator, owner</li>
        <li>Target information: Technical name of Local Table, File Path, CSV properties</li>
      </ul>
      <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions in the SAP GUI"</span>
	  `},
{id:"s14",title:"1.4 Create from Template",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
 <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS</span>
      </div>
      <div class="step-goal">Goal: Faster creation by copying an existing subscription.</div>
      <ol>
        <li>Select existing subscription in the RSDPS list</li>
        <li><strong>Create from Template</strong> click</li>
        <li>Optional: Adjust Source, Target, Extraction Mode, Scheduling</li>
        <li>Save</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> Even if the template is of type SUBS, the new subscription will automatically be created as <strong>DSUB</strong> (= transportable).<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions from Template"</span>
		`},
{id:"s21",title:"2.1 Activate",phase:"Phase 2 – Activate & Execute",color:"#188918",
 content:`
 <span class="badge badge-pflicht">Required</span>
        <span class="badge badge-tool">BWMT or RSDPS</span>
      </div>
      <div class="step-goal">Goal: Make the subscription executable and create the Local Table (File) in Datasphere.</div>
      <p><strong>Option A – Via BWMT (recommended for multiple subscriptions):</strong></p>
      <ul>
        <li>In the <strong>Data Subscriptions View</strong>: Select one or more subscriptions (via <code>CTRL + Click</code>)</li>
        <li>Right-click → <strong>Activate</strong></li>
        <li>Advantage: <strong>Mass-Aktivierung</strong> of multiple subscriptions at once is possible</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>Option B – Via RSDPS:</strong></p>
      <ul>
        <li>Select Data Subscription → <strong>Edit</strong> → <strong>Activate Data Subscription</strong></li>
      </ul>
      <p style="margin-top:0.7rem"><strong>What happens during activation:</strong></p>
      <ul>
        <li>Status changes from <strong>Inactive → Active</strong></li>
        <li>SAP Datasphere entity is <strong>asynchronouslyously</strong> created and deployed</li>
        <li><strong>Local Table (File)</strong> By default, the system derives the technical name automatically from the selected source object (InfoProvider). By setting a custom technical name, you can change the default behavior and enter a meaningful identifier of your choice when creating the data subscription</li>
        <li>Semantics Usage Type: <strong>Local Table (Fact)</strong></li>
      </ul>
      <div class="callout callout-info">
        <strong>ℹ️ Versions:</strong> Data Subscriptions have an <strong>M (Modified)</strong> and <strong>A (Active)</strong> version. After changes, reactivation is required so A = M. Transport is only possible when A = M.<br>
        <span class="source-tag">Source: SAP Help – "Transporting and Migrating Data Subscriptions"</span>
      </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Local Table:</strong> With SAP Note 3724724 (Data Subscriptions 4.0) it is possible to assign the technical name of the Local Table in Datasphere. It is also possible to migrate existing subscriptions (created before 4.0) and set a custom technical name afterwards.<br>
        🔗 <a href="https://help.sap.com/docs/SAP_BW4HANA/ed919380760a44388ab90e6bb3e7480a/87a6fd1da8cd44509e77c232f39c8449.html?locale=en-US" target="_blank" style="color:var(--sap-blue)">See SAP BW/4 Help - Local Tables</a>
      </div>
      `},
{id:"s22",title:"2.2 Execute",phase:"Phase 2 – Activate & Execute",color:"#188918",
 content:`
 <span class="badge badge-pflicht">Required</span>
        <span class="badge badge-tool">RSDPS (manual) or Process Chain (scheduled)</span>
      </div>
      <div class="step-goal">Goal: Perform the actual data extraction.

      <p><strong>Option A – Manual via RSDPS:</strong></p>
      <ol>
        <li>Transaction <code>RSDPS</code> open</li>
        <li>Data Subscription in the list select</li>
        <li><strong>Run</strong> click</li>
      </ol>

      <p style="margin-top:0.7rem"><strong>Option B – Automatic via Process Chain:</strong></p>
      <ul>
        <li>If the subscription is configured with scheduling "Process Chain" the extraction is triggered <strong>via the process chain</strong> (e.g. time-scheduled or after a preceding load step)</li>
        <li>Process chain configuration is done via <code>RSA1</code> or <code>RSPC1</code> (see Phase 3)</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>Result:</strong> Data is extracted from the BW InfoProvider into the Local Table (File). In delta mode, only changed data is extracted.</p>
      <span class="source-tag">Source: SAP Help – "RSDPS Transaction in SAP GUI only only" → Section "Actions for Data Subscriptions"</span>
	  `},
{id:"s23",title:"2.3 Verify Results",phase:"Phase 2 – Activate & Execute",color:"#188918",
 content:`
 <span class="badge badge-empfohlen">Recommended</span>
        <span class="badge badge-tool">RSDPS + optionally RSA1</span>
      </div>
      <div class="step-goal">Goal: Verify the success of the extraction.</div>

      <p><strong>In RSDPS (for manual and scheduled runs):</strong></p>
      <ul>
        <li>The <strong>Last Run</strong> column in the subscription list shows the status of the last run – regardless of whether triggered manually or via chain</li>
        <li><strong>Runtime</strong> click → Detailed information about the last run</li>
        <li><strong>Browse</strong> click → View data in the Local Table (File)</li>
        <li><strong>Check</strong> click → Identify potential issues (Source, Target, Connection, Local Table)</li>
      </ul>
      <div class="callout callout-info">
        <strong>ℹ️ For scheduled runs (Process Chain):</strong> For the detailed log (duration, error messages, individual steps), it is additionally recommended to check the <strong>Process Chain Log</strong> in <code>RSA1</code> → Monitoring or in the Process Chain Editor of the BW/4HANA Cockpit.<br>     
    	<table class="data">
        <tr><th>Status</th><th>Bedeutung</th></tr>
        <tr><td>🟢 Last Run Successful</td><td>Extraction successful</td></tr>
        <tr><td>🔴 Last Run Failed</td><td>Extraction failed</td></tr>
        <tr><td>⚪ Not Run</td><td>Not yet executed</td></tr>
      </table>
      <span class="source-tag">Source: SAP Help – "RSDPS Transaction in SAP GUI only only" → Section "Columns and Values"</span>
	  `},
{id:"s31",title:"3.1 Process Chain",phase:"Phase 3 – Automation",color:"#7c6bbf",
 content:`
 <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS + RSA1/RSPC1</span>
      </div>
      <div class="step-goal">Goal: Execute extraction automatically on a scheduled basis.</div>
      <ol>
        <li>In <code>RSA1</code> or <code>RSPC1</code>: <strong>Create a new Process Chain</strong> or add a new step to an <strong>existing Process Chain</strong></li>
        <li>Process Type: <strong>Load Process and Postprocessing → Data Provisioning Subscription</strong></li>
        <li>New <strong>Process Variant</strong> (initially empty, without subscriptions)</li>
        <li>In <code>RSDPS</code>: Edit subscription → Set scheduling to "Process Chain" → Variant zuweisen</li>
        <li>Activate the subscription</li>
        <li>In RSA1: Verify variant → Subscription should now appear</li>
        <li>Execute the Process Chain</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Warning – Empty Variant:</strong> The Process Variant is initially created <strong>empty</strong> . Subscriptions are linked to the variant through assignment <em>within the subscription itself</em> – not the other way aroand!<br>
      <span class="source-tag">Source: SAP Help – "Scheduling Data Subscriptions With Process Chains"</span>
	  </div>  
	  <div class="callout callout-info">
        <strong>ℹ️ Existing Chains:</strong> The DPG step does not necessarily need to be in a new Process Chain. It can be integrated as an <strong>additional step in an existing load chain</strong> – e.g. directly after loading data into the InfoProvider, to automatically trigger the extraction to the Object Store.<br>
      <span class="source-tag">Source: SAP Help – "Scheduling Data Subscriptions With Process Chains"</span>
	  </div>	  
      <div class="callout callout-info">
        <strong>ℹ️ Technical User recommended:</strong> For Process Chains and transports, SAP recommends switching the OAuth configuration to a <strong>Technical User</strong> in Datasphere (instead of Interactive Usage). This simplifies authentication and is a prerequisite for backgroand runs. For details see SAP Note 3590400, chapter "Switching the OAuth Configuration to a Technical User".<br>
        <span class="source-tag">Source: SAP Note 3590400 – "Configuring the Data Product Generator"</span>
      </div>    
      `},
{id:"s32",title:"3.2 Task Chains (DSP)",phase:"Phase 3 – Automation",color:"#7c6bbf",
 content:`
 <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS + Datasphere</span>
      </div>
      <div class="step-goal">Goal: End-to-end automation BW ↔ Datasphere (e.g. Merge Task after extraction).</div>
      <ol>
        <li>In Datasphere: Create Task Chain (also possible in the BW File Space)</li>
        <li>In BW: Create/edit Process Chain and add a new step</li>
        <li>Process Type: <strong>General Services → Task Chain</strong></li>
        <li>Specify Target, Space, and Task Chain</li>
        <li>Save, Activate, Execute</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Prerequisite:</strong> Integrating Task Chains into Process Chains only makes sense if the associated Data Subscription is <strong>scheduled (Scheduling = Process Chain)</strong> – not set to manual execution. Otherwise, the Task Chain will never be triggered automatically.<br>
        <span class="source-tag">Source: SAP Help – "Running Task Chains in Process Chains"</span>      
      <span class="source-tag">Source: SAP Help – "Running Task Chains in Process Chains"</span>
	  `},
{id:"s41",title:"4.1 Share Local Table",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
 <span class="badge badge-optional">Optional – for reporting/modeling only</span>
      </div>
      <div class="step-goal">Goal: Make extracted data available for modeling and reporting in Datasphere. Not required if the sole goal is sharing as a Data Product via Delta Sharing.</div>
      <ul>
        <li>Local Table is stored in the <strong>BW File Space</strong> (read-only, Object Store / HDLFS)</li>
        <li>Per <strong>Sharing</strong> share to other spaces → use there for HANA-based modeling</li>
        <li>Structure of the Local Table cannot be changed as long as the subscription exists</li>
      </ul>
      <div class="callout callout-info">
        <strong>ℹ️ When is this step necessary?</strong> Only when the BW data needs to be used in Datasphere for analytical models, views, or SAC stories. For the pure <strong>Data-Product-/Delta-Sharing-Pfad</strong> (Steps 4.2 + 4.3), the Data Product can be created directly from the BW File Space – sharing to another space is not required.      
      <span class="source-tag">Source: SAP Help – "Creating Data Subscriptions"</span>
	  `},
{id:"s42",title:"4.2 Create Data Product",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
 <span class="badge badge-pflicht">Required (for Data Product scenario)</span>
      </div>
      <div class="step-goal">Goal: Create a custom Data Product from the Local Table in the BW File Space and list it in the Catalog.</div>
      <p><strong>Prerequisite:</strong> A <strong>Formations Profile</strong> must be created in the Data Sharing Cockpit (Visibility: "Formations"). See SAP Help – "Creating Custom Delta Share Data Products - Creating Formations Profile".</p>
      <p><strong>Procedure in SAP Datasphere:</strong></p>
      <ol>
        <li><strong>Data Sharing Cockpit → My Data Products</strong> open</li>
        <li><strong>Create Product</strong> click</li>
        <li><strong>Business Name</strong> enter (e.g. "Sales Orders") – Technical Name is auto-generated</li>
        <li>In section <strong>Overview</strong>: Enter description</li>
        <li>In section <strong>Product Details</strong>: <strong>Data Category</strong> select (e.g. "Company Data") – Fields Contexts, Delivery Mode and Contract Type be automatisch set (Formations / Delta Share / Free)</li>
        <li>In section <strong>Product Artifacts</strong>: Select the <strong>BW File Space</strong> as Product Artifact Space</li>
        <li>Click the <strong>Plus-Icon</strong> to add the desired <strong>Local Table (File)</strong> and confirm</li>
        <li><strong>Save Changes</strong> click</li>
        <li><strong>Switch Status → List</strong> to list the Data Product in the Catalog</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> This step takes place entirely in <strong>SAP Datasphere</strong> . The Data Product is a <strong>Custom Data Product</strong>, maintained by your own organization (not by SAP). After listing, it appears in the Catalog in Datasphere and the BDC Cockpit.<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Products (Data Sharing Cockpit)"</span>
      </div>
      <div class="callout callout-warn">
        <strong>⚠️ Synchronization:</strong> It may take some time for the Data Product to appear in the Catalog, as systems need to synchronize first. If needed, the Catalog administrator can trigger a manual synchronization.<br>
        <span class="source-tag">Source: SAP Help – "Creating Data Products (Data Sharing Cockpit)"</span>
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Roadmap – Automation Planned:</strong> According to the SAP Roadmap, automating the manual Data Product creation from the Local Table is planned. This step will become obsolete in the future.<br>
        🔗 <a href="https://roadmaps.sap.com/board?PRODUCT=73555000100800004851&range=CURRENT-LAST#;INNO=000D3AAC9DD21FD0A4C203167B3998EE" target="_blank" style="color:var(--sap-blue)">View SAP Roadmap Item</a>
		`},
{id:"s43",title:"4.3 BDC Connect (Delta Share)",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
 <span class="badge badge-optional">Optional</span>
      </div>
      <div class="step-goal">Goal: Share the listed BW Data Product to Databricks/Snowfalke/MS-Fabrics(Q3-2026)/Google BigQuery(Q4-2026 – for AI/ML and advanced analytics scenarios.</div>
      <p><strong>Prerequisite:</strong> External tool must be connected in SAP BDC Connect.</p>
      <p><strong>Procedure in SAP Business Data Cloud Cockpit:</strong></p>
      <ol>
        <li><strong>Catalog &amp; Marketplace → Search</strong> open</li>
        <li>Search for the created BW Data Product and open the details page</li>
        <li><strong>Share</strong> click → <strong>Manage Access</strong> dialog opens</li>
        <li><strong>Target System:</strong> Select the External tool</li>
        <li><strong>Share Name</strong> enter (lowercase only, cannot be changed afterwards)</li>
        <li><strong>Workspace</strong> in external tool select (one or more)</li>
        <li><strong>Share</strong> click</li>
      </ol>
      <p style="margin-top:0.7rem"><strong>Result:</strong> The Data Product is available in the external Tool (Databricks:<strong>Delta Table in Unity Catalog</strong> (folder: Delta Share Received)). From there, notebooks can be created for Data Preparation, Training, Forecasting, etc. Results can be shared back as a Data Product to the BDC Catalog.</p>
      <div class="callout callout-info">
        <strong>ℹ️ Zero-Copy Sharing:</strong> Delta Sharing shares data live across platforms, clouds, and regions – without copying or moving the data.<br>
        <span class="source-tag">Source: SAP Help – "Sharing Data Products to SAP Databricks"</span>
		`},
{id:"s51",title:"5.1 SUBS to DSUB",phase:"Phase 5 – Transport",color:"#6b7280",
 content:`
 <span class="badge badge-optional">Optional (if legacy subscriptions exist)</span>
        <span class="badge badge-tool">RSDPS / SE38</span>
      </div>
      <div class="step-goal">Goal: Make existing local subscriptions transportable.</div>
      <ol>
        <li><code>SE38</code> → Report <code>RSDDS_DSUB_MIGRATION</code> execute</li>
        <li>Select subscriptions to migrate</li>
        <li>Specify Transport Request and Package</li>
        <li>Optional: <strong>Enable Simulation</strong> for dry run</li>
        <li>Execute</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> All new subscriptions are automatically created as DSUB.<br>
        <span class="source-tag">Source: SAP Help – "Migrating Data Subscriptions from SUBS to DSUB"</span>
		`},
{id:"s52",title:"5.2 Transport Prerequisites",phase:"Phase 5 – Transport",color:"#6b7280",
 content:`
 <span class="badge badge-pflicht">Required (for transport)</span>
      <table class="data">
        <tr><th>Voraussetzung</th><th>Details</th></tr>
        <tr><td>Typ</td><td><strong>DSUB</strong> (not SUBS)</td></tr>
        <tr><td>Status</td><td><strong>A (Active)</strong> – M and A must be equal</td></tr>
        <tr><td>Package</td><td>Not <code>$TMP</code></td></tr>
        <tr><td>Transport Request</td><td>Must be assigned</td></tr>
      </table>
      <span class="source-tag">Source: SAP Help – "Transporting Data Subscriptions"</span>
	  `},
{id:"s61",title:"6.1 Delete Individual",phase:"Phase 6 – Cleanup",color:"#6b7280",
 content:`<span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS or BWMT</span>      
      <ul>
        <li><strong>RSDPS:</strong> Select subscription → <strong>Delete</strong> (single)</li>
        <li><strong>BWMT Data Subscriptions View:</strong> Select one or more subscriptions select → Right-click → <strong>Delete</strong> (mass delete possible)</li>
        <li>Local Table (File) is <strong>NOT</strong> automatically deleted → must be manually removed in Datasphere</li>
        <li>After deleting the subscription, the Local Table loses its read-only flag</li>
      </ul>
      <span class="source-tag">Source: SAP Help – "Deleting Data Subscriptions", "Deleting Dependent Objects"</span>
	  `},
{id:"s62",title:"6.2 Mass Delete",phase:"Phase 6 – Cleanup",color:"#6b7280",
 content:`
 <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS / SE38</span>
      </div>
      <ul>
        <li><code>SE38</code> → Report <code>RSDDS_DELETE_BY_SOURCE</code></li>
        <li>Or: <code>RSDPS</code> → <strong>Goto → Delete Data Subscriptions by Target</strong></li>
        <li>Options: <strong>Simulate Deletion</strong> (dry run), <strong>Force Deletion</strong> (ignores errors)</li>
      </ul>
      <div class="callout callout-danger">
        <strong>⚠️ Warning for Force Deletion:</strong> If the Datasphere connection is not working during the deletion, the Local Tables may retain their read-only flag and cannot be deleted afterwards in Datasphere!<br>
        <span class="source-tag">Source: SAP Help – "Mass Deleting Data Subscriptions by Target"</span>
		`},
{id:"happypath",title:"Happy Path",phase:null,color:"#333",
 content:`
 <h2 id="happypath">✅ Minimal Workflow (Happy Path)</h2>
    <ol>
      <li>Check prerequisites (BW 7.5 SP24+, BWPCE, Datasphere with Object Store)</li>
      <li>Implement SAP Notes (<code>3593519</code>, <code>3590400</code>)</li>
      <li>Configure DPG (<code>SAP_BW_BDC_CONFIGURATION</code>)</li>
      <li>Create target (<code>RSDPS</code> → Goto → Maintain Target System)</li>
      <li>Generate Data Subscriptions (BWMT Scenario Generator or <code>RSDPS</code> → Create)</li>
      <li><em>Optional:</em> Adjust Extraction Mode, Selection, Projection</li>
      <li>Data Subscriptions <strong>activate</strong> (BWMT or <code>RSDPS</code>)</li>
      <li>Data Subscriptions <strong>execute</strong> (<code>RSDPS</code> → Run)</li>
      <li>Verify results (<code>RSDPS</code> → Runtime / Browse)</li>
      <li>In Datasphere: <em>Optional:</em> Local Table an another space (for reporting only)</li>
      <li>In Datasphere: Create Data Product in Data Sharing Cockpit → Status on "Listed"</li>
      <li><em>Optional:</em> In BDC Cockpit: Share Data Product to Databricks via Delta Sharing</li>
    </ol>
	`},
{id:"questions",title:"Clarification Questions",phase:null,color:"#333",
 content:`
 <h2 id="questions">❓ Clarification Questions</h2>
    <ol>
      <li><strong>Licensing:</strong> Is the BW 7.5 running as BWPCE in SAP BDC? <em>(Mandatory prerequisite!)</em></li>
      <li><strong>SP-Level:</strong> Is at least SP24 implemented?</li>
      <li><strong>Object Store:</strong> Is the Object Store in Datasphere already activated?</li>
      <li><strong>SAP Notes:</strong> Are Notes 3593519 and 3590400 already implemented?</li>
      <li><strong>Certificates:</strong> Are SSL certificates correctly maintained in STRUST?</li>
      <li><strong>InfoProviders:</strong> Which should be replicated initially? (aDSOs, CompositeProviders, Queries?)</li>
      <li><strong>Delta or Full?</strong> Is incremental extraction desired?</li>
      <li><strong>Transport:</strong> Should subscriptions be transported between DEV/QAS/PRD?</li>
      <li><strong>Automation:</strong> Should extraction be controlled via Process Chain?</li>
      <li><strong>Databricks:</strong> Is Databricks integration (Delta Sharing) a topic?</li>
      <li><strong>Multiple BW Systems:</strong> If multiple BW systems exist – should they write to the same or separate Datasphere spaces? (Whether multiple BW systems can technically use the same space is not explicitly documented by SAP and should be clarified with SAP.)</li>
    </ol>
	`},

const P = {de: [{name:"Phase 0 – Voraussetzungen",color:"#e76500",items:["s01","s02","s03","s04","s05","s06"]},{name:"Phase 1 – Subscriptions",color:"#0070f2",items:["s11","s12","s13","s14"]},{name:"Phase 2 – Aktivieren",color:"#188918",items:["s21","s22","s23"]},{name:"Phase 3 – Automatisierung",color:"#7c6bbf",items:["s31","s32"]},{name:"Phase 4 – Data Products",color:"#cc1919",items:["s41","s42","s43"]},{name:"Phase 5 – Transport",color:"#6b7280",items:["s51","s52"]},{name:"Phase 6 – Löschen",color:"#6b7280",items:["s61","s62"]}], en: [{name:"Phase 0 – Prerequisites",color:"#e76500",items:["s01","s02","s03","s04","s05","s06"]},{name:"Phase 1 – Subscriptions",color:"#0070f2",items:["s11","s12","s13","s14"]},{name:"Phase 2 – Activate & Execute",color:"#188918",items:["s21","s22","s23"]},{name:"Phase 3 – Automation",color:"#7c6bbf",items:["s31","s32"]},{name:"Phase 4 – Data Products",color:"#cc1919",items:["s41","s42","s43"]},{name:"Phase 5 – Transport",color:"#6b7280",items:["s51","s52"]},{name:"Phase 6 – Cleanup",color:"#6b7280",items:["s61","s62"]}]};

          </div>

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
