{id:"bw75",title:"Besonderheiten BW 7.5",phase:null,color:"#333",
 content:`
 	<div class="system-alert" id="bw75">
    <h3>⚠️ Besonderheiten für SAP BW 7.5</h3>
    <table>
      <tr><td>UI</td><td>Kein BW/4HANA Cockpit → nur <strong>Transaktion RSDPS</strong> in SAP GUI</td></tr>
      <tr><td>BWMT (Eclipse)</td><td>BW Modeling Tools ab <strong>BWMT 1.27</strong> verfügbar (inkl. Scenario Generator)</td></tr>
      <tr><td>Mindest-SP</td><td><strong>SP24 oder höher</strong> erforderlich</td></tr>
      <tr><td>Catalog-Integration</td><td><strong>Nicht verfügbar</strong> (erst ab BW/4HANA 2023 SP04)</td></tr>
      <tr><td>Konfiguration</td><td>SAP Note <strong>3590400</strong> (enthält Installationsanleitung + Hinweis auf SAP-Ticket)</td></tr>
      <tr><td>SAP-Ticket</td><td><strong>Pflicht!</strong> Unter Komponente <strong>BDC-BW</strong> ein Ticket erstellen mit: System ID (SID), Installationsnummer, Datasphere Tenant URL. Ohne Ticket kann der Pilot-Note nicht freigeschaltet werden und die Task List schlägt fehl.</td></tr>
      <tr><td>Sprache</td><td>DPG ist <strong>ausschließlich in Englisch</strong> verfügbar. Anmeldung am BW-System muss auf Englisch erfolgen, sonst drohen Fehler.</td></tr>
      <tr><td>Installation</td><td>Per TCI via SAP Note <strong>3678407</strong> (Data Subscriptions 3.0) oder <strong>3593519</strong> (Data Subscriptions 2.0)</td></tr>
    </table>
    <span class="source-tag">Quellen: SAP Help – „Data Subscriptions"; Blog „The SAP BW DPG for SAP BDC"; Blog „Expose BW 7.5 objects as Data Products"</span>
  </div>
  `},
{id:"overview",title:"Überblick DPG",phase:null,color:"#333",
 content:`
 <h2 id="overview">Was ist der Data Product Generator?</h2>
    <p>Der DPG ermöglicht es, Daten aus BW InfoProvidern (aDSOs, CompositeProvider, InfoObjects, MultiProvider, InfoCubes, Queries) über das <strong>ODP-Framework</strong> in <strong>Local Tables (File)</strong> im Object Store von SAP Datasphere zu extrahieren. Diese Local Tables können anschließend als <strong>Data Products</strong> veröffentlicht und z.B. nach SAP Databricks geteilt werden.</p>
    <p style="margin-top:0.5rem"><strong>Kernkonzept:</strong> Eine <em>Data Subscription</em> definiert WAS (Quelle, Felder, Filter) und WOHIN (Target/Space in Datasphere) extrahiert wird – sie enthält keine Daten selbst, sondern die Extraktionsdefinition.</p>
    <span class="source-tag">Quelle: SAP Help – „Data Subscription (DSUB and SUBS)"</span>
	`},
{id:"toolcomp",title:"Funktionsvergleich Tools",phase:null,color:"#333",
 content:`<h2 id="toolcomp">🔧 Funktionsvergleich der Verwaltungs-Tools</h2>
    <p style="margin-bottom:0.7rem">Die Data Subscriptions können über verschiedene Tools verwaltet werden. Für BW 7.5 stehen die <strong>Transaktion RSDPS</strong> (SAP GUI) und die <strong>BW Modeling Tools</strong> (Eclipse) zur Verfügung. Die Data Subscriptions App im BW/4HANA Cockpit ist nur ab BW/4HANA verfügbar und wird hier der Vollständigkeit halber aufgeführt.</p>
    <table class="data">
      <tr>
        <th>Aktion</th>
        <th>RSDPS<br><span style="font-weight:400;font-size:0.75rem">SAP GUI</span></th>
        <th>BWMT Data Subscriptions<br><span style="font-weight:400;font-size:0.75rem">Eclipse</span></th>
        <th>BWMT Scenario Generator<br><span style="font-weight:400;font-size:0.75rem">Eclipse</span></th>
        <th class="col-disabled">Data Subscriptions App<br><span style="font-weight:400;font-size:0.75rem">BW/4HANA Cockpit<br>⛔ nicht für BW 7.5</span></th>
      </tr>
      <tr><td><strong>Create</strong></td><td>✅</td><td>❌</td><td>✅ Mass-Generate</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Create from Template</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Edit</strong> (Extraction Mode, Selection, Projection, Scheduling)</td><td>✅</td><td>❌</td><td>⚠️ Nur vor Generate</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Activate / Deactivate</strong></td><td>✅ (einzeln)</td><td>✅ (auch Mass)</td><td>✅ (beim Generate)</td><td class="col-disabled">✅ (einzeln)</td></tr>
      <tr><td><strong>Run</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅</td></tr>
      <tr><td><strong>Delete</strong></td><td>✅ (einzeln)</td><td>✅ (auch Mass)</td><td>✅ (auch Mass)</td><td class="col-disabled">✅ (einzeln)</td></tr>
      <tr><td><strong>Check</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Runtime / Browse</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">✅ (View Executions)</td></tr>
      <tr><td><strong>Reset Delta</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Data Preview</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Mass Delete by Target</strong></td><td>✅ (via Report)</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>Maintain Target System</strong></td><td>✅</td><td>❌</td><td>❌</td><td class="col-disabled">❌</td></tr>
      <tr><td><strong>View Local Table (File)</strong></td><td>✅</td><td>✅ (CTRL+Click)</td><td>❌</td><td class="col-disabled">✅</td></tr>
    </table>
    <div class="callout callout-warn" style="margin-top:0.8rem">
      <strong>⚠️ Fazit für BW 7.5:</strong> Für nachträgliche Änderungen an bestehenden Subscriptions (Edit) sowie für das <strong>Ausführen (Run)</strong> führt kein Weg an der <strong>Transaktion <code>RSDPS</code></strong> vorbei. Die BWMT bietet ergänzend Mass-Operationen (Activate, Delete) und den <strong>Scenario Generator</strong> für die initiale Generierung komplexer Modelle.
    </div>
    <span class="source-tag">Quelle: SAP Help – „RSDPS Transaction in SAP GUI", „BW Data Product Generator Perspective in BW Modeling Tools (BWMT)", „Data Subscriptions App in SAP BW/4HANA Cockpit"; eigene Konsolidierung</span>
	`},
{id:"s01",title:"0.1 Systemlandschaft prüfen",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
      </div>
      <div class="step-goal">Ziel: Sicherstellen, dass die technische Grundlage gegeben ist.</div>
      <ul>
        <li>SAP BW 7.5 mit <strong>mindestens SP24</strong></li>
        <li>Das BW-System muss als <strong>SAP Business Warehouse, private cloud edition (BWPCE)</strong> in SAP Business Data Cloud betrieben werden</li>
        <li>SAP Datasphere mit <strong>aktiviertem Object Store</strong> muss vorhanden sein</li>
        <li>Konnektivität zwischen BW und Datasphere muss herstellbar sein</li>
      </ul>
      
      <div class="callout callout-warn">
        <strong>⚠️ Sprachrestriktion:</strong> Der Data Product Generator und alle TCIs sind <strong>ausschließlich in Englisch</strong> verfügbar. Die Anmeldung am BW-System muss auf Englisch erfolgen (<code>Sprache = EN</code>). Bei Anmeldung in einer anderen Sprache können unerwartete Fehler auftreten.<br>
        <span class="source-tag">Quelle: SAP Note 3590400 – "Configuring the Data Product Generator", Abschnitt "Install the Main TCI"</span>
      </div>
      <div class="callout callout-danger">
        <strong>⚠️ Lizenz-Restriktion:</strong> Der DPG ist laut SAP nur für BW-Systeme zugelassen, die als BWPCE in der SAP Private Cloud betrieben werden – <strong>nicht</strong> für On-Premise-Standalone.<br>
        <span class="source-tag">Quelle: Blog „The SAP BW DPG for SAP BDC"</span>
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Offener Punkt:</strong> Ob es mittlerweile Ausnahmen für On-Premise gibt, konnte nicht sicher geklärt werden. Der Blog „BW DPG to Databricks" erwähnt: <em>„speak to your SAP team for potential options"</em>. <strong>Bitte intern mit SAP klären.</strong>
		`},
{id:"s02",title:"0.2 SAP Notes einspielen",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
      </div>
      <div class="step-goal">Ziel: Den DPG-Code im BW-System installieren.</div>
      <p><strong>Relevante SAP Notes:</strong></p>
      <table class="data">
        <tr><th>Note</th><th>Inhalt</th></tr>
        <tr><td><code>3590400</code></td><td>Konfigurations-Anleitung für den DPG (erster Schritt: enthält Installationsanleitung und Hinweis auf SAP-Ticket-Erstellung)</td></tr>
        <tr><td><code>3678407</code></td><td>TCI für Data Subscriptions 3.0 – aktuellste Version des DPG-Codes</td></tr>
        <tr><td><code>3593519</code></td><td>TCI für Data Subscriptions 2.0 – ältere Version (nur relevant falls 3678407 nicht anwendbar)</td></tr>
        <tr><td><code>3590318</code></td><td>Pilot BW Configuration – wird nach Support Case freigeschaltet (Pflicht)</td></tr>
        <tr><td><code>3581186</code></td><td>OA2C: RFC API (Pflicht)</td></tr>
        <tr><td><code>3089413</code></td><td>CVE-2023-0014: Capture-replay vulnerability in SAP NetWeaver AS (Pflicht)</td></tr>
        <tr><td><code>3224161</code></td><td>Voraussetzung für Note 3089413 (Pflicht)</td></tr>
        <tr><td><code>3600085</code></td><td>Note Analyzer for UI5 Corrections (nur BW/4HANA 2021/2023)</td></tr>
      </table>
      <ol>
        <li>SAP Note 3590400 als Einstiegspunkt lesen – enthält die vollständige Installationsanleitung und den Hinweis, ein SAP-Ticket zu erstellen</li>
        <li>SAP Note 3678407 (Data Subscriptions 3.0) über den <strong>Note Analyzer</strong> prüfen und alle Korrekturen einspielen. Falls nicht anwendbar: SAP Note 3593519 (Data Subscriptions 2.0) verwenden</li>
        <li>Note Analyzer für Data Product Generator ausführen → alle Checks müssen grün sein</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Warnung – Zertifikate:</strong> SSL-Zertifikate müssen korrekt in <code>STRUST</code> hinterlegt sein, damit die Verbindung zu Datasphere funktioniert.<br>
        <span class="source-tag">Quelle: Blog „BW DPG to Databricks"</span>
		`},
{id:"s03",title:"0.3 DPG-Konfiguration",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
      </div>
      <div class="step-goal">Ziel: Die Verbindung zwischen BW und SAP Datasphere herstellen, BW File Space anlegen.</div>
      <ol>
        <li>Konfigurationsaufgabe <code>SAP_BW_BDC_CONFIGURATION</code> ausführen (Details in SAP Note 3590400)</li>
        <li>Dabei wird ein initialer <strong>BW File Space</strong> in Datasphere angelegt (Typ: HDLFS)</li>
        <li>Über <code>RSDPS</code> → <strong>Goto → Maintain Target System</strong> können <strong>weitere Targets</strong> konfiguriert werden, die auf unterschiedliche Spaces verweisen. Bei der Erstellung einer Subscription wird der gewünschte Target Space ausgewählt.</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️ Multiple Targets:</strong> Der DPG unterstützt inzwischen <strong>mehrere Datasphere Targets und Spaces</strong> pro BW-System, um Daten z.B. nach Fachbereichen zu separieren. Die Konfigurationsaufgabe ist zudem <strong>wiederholbar</strong>.<br>
        <span class="source-tag">Quelle: SAP Architecture Center – „Modernizing SAP BW with SAP BDC" (Feature: „Supporting multiple SAP Datasphere targets and spaces"); Blog „BW DPG to Databricks"</span>
      </div>
      <div class="callout callout-warn">
        <strong>⚠️ BW File Space ist read-only:</strong> Es können keine eigenen Objekte erstellt werden (Ausnahme: Task Chains). Datenverwaltung (z.B. Löschen) ist möglich. Local Tables können per Sharing an andere Spaces geteilt werden.<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions"</span>
		</div>
		`},
{id:"s04",title:"0.4 Target(s) konfigurieren",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
        <span class="badge badge-tool">RSDPS</span>      
      <div class="step-goal">Ziel: Mindestens ein Ziel anlegen, das für Data Subscriptions ausgewählt werden kann.
      <ol>
        <li>Transaktion <code>RSDPS</code> → Menü <strong>Goto → Maintain Target System</strong></li>
        <li>Target anlegen (verweist auf BW File Space / Datasphere Tenant)</li>
        <li>Target Type wird automatisch auf <strong>HDLFS</strong> gesetzt</li>
        <li>Optional: Ein Target als <strong>Preferred Target</strong> markieren</li>
      </ol>
      <span class="source-tag">Quelle: SAP Help – „RSDPS Transaction in SAP GUI", „Configuring Targets for the Data Product Generator"</span>
	  `},
{id:"s05",title:"0.5 Berechtigungen DSP",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
      </div>
      <div class="step-goal">Ziel: Sicherstellen, dass Benutzer in Datasphere die nötigen Rollen haben.
      <p><strong>Erforderliche Scoped Roles (mindestens eine):</strong></p>
      <ul>
        <li><strong>DW Space Administrator</strong> – Benutzerverwaltung &amp; Monitoring</li>
        <li><strong>DW Integrator</strong> – Überwachung der Datenintegration im Space</li>
        <li><strong>DW Modeler</strong> – Local Tables an andere Spaces teilen</li>
      </ul>
      <span class="source-tag">Quelle: Blog „Expose BW 7.5 objects as Data Products in Databricks"</span>
	  `},
{id:"s06",title:"0.6 Berechtigungen BW",phase:"Phase 0 – Voraussetzungen",color:"#e76500",
 content:`
	 <span class="badge badge-pflicht">Pflicht</span>
	 <div class="step-goal">Ziel: Sicherstellen, dass die benötigten Berechtigungen im BW-System vergeben sind.</div>
      <p><strong>Für die Konnektivität (Connectivity Setup):</strong></p>
      <ul>
        <li>Berechtigungsobjekt <strong><code>S_RS_DDSTG</code></strong> für den Dialog-User</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>Für das Erstellen von Data Subscriptions:</strong></p>
      <ul>
        <li>Berechtigungsobjekt <strong><code>S_RS_DDS</code></strong> für den Dialog-User</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>Für Background-Runs (Process Chains):</strong></p>
      <ul>
        <li>Berechtigungsobjekt <strong><code>S_RS_DDS</code></strong> für den BW-Hintergrundbenutzer (z.B. BWREMOTE)</li>
      </ul>
      <p style="margin-top:0.7rem"><strong>Für die OAuth-Konfiguration (STRUST, SOAUTH2_CLIENT):</strong></p>
      <table class="data">
        <tr><th>Berechtigungsobjekt</th><th>Attribut</th><th>Wert</th></tr>
        <tr><td><code>S_OA2C_ADM</code></td><td>ACTVT</td><td>01, 02, 03, 06</td></tr>
        <tr><td><code>S_SEC_COMM</code></td><td>ACTVT</td><td>03</td></tr>
        <tr><td><code>S_OA2C_USE</code></td><td>OA2C_PROF</td><td>BW4_DWC</td></tr>
        <tr><td></td><td>ACTVT</td><td>16</td></tr>
        <tr><td><code>S_PSE_ADM</code></td><td>ACTVT</td><td>01</td></tr>
      </table>
      <div class="callout callout-info">
        <strong>ℹ️ Nur BW/4HANA:</strong> Zusätzlich die Rolle <strong><code>SAP_BW4_MODELER_FOR_BDC</code></strong> zuweisen.
      </div>
      <span class="source-tag">Quelle: SAP Note 3590400 – "Configuring the Data Product Generator", Abschnitt "Authorizations in SAP BW or SAP BW/4HANA"</span>
	  `},
{id:"s11",title:"1.1 Scenario Generator (BWMT)",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
        <span class="badge badge-empfohlen">Empfohlen</span>
        <span class="badge badge-tool">BWMT / Eclipse</span>
      </div>
      <div class="step-goal">Ziel: Gesamtes BW-Modell inkl. aller Abhängigkeiten (z.B. InfoObjects eines CompositeProviders) als Subscriptions abbilden und in einem Schritt generieren.</div>
      <p><strong>Voraussetzung:</strong> BWMT Version <strong>1.27</strong> (für die BW Data Product Generator Perspective: <strong>1.27.1</strong>)</p>
      <p><strong>Konzept:</strong> Ein <em>Scenario</em> = Liste von Referenzen zwischen Data Subscriptions zum vollständigen Abbilden eines BW-Modells. Der <em>Scenario Tree</em> speichert Abhängigkeiten und berücksichtigt vorhandene Subscriptions (keine Duplikate).</p>
      <p><strong>Vorgehen:</strong></p>
      <ol>
        <li>Eclipse: <strong>Window → Show View → Business Warehouse → Scenario Generator (Data Subscriptions)</strong></li>
        <li>Tab <strong>Scenario Core Objects</strong>: BW-Objekte hinzufügen (aDSOs, CompositeProvider, etc.)</li>
        <li><strong>Collection Grouping</strong> wählen (Empfehlung: „Only Necessary Objects")</li>
        <li><strong>Association Levels</strong> setzen (Default: 4)</li>
        <li><strong>Target</strong> auswählen (Pflicht) und optional <strong>Process Chain Variant</strong></li>
        <li>Weitere Optionen setzen (z.B. „Use Existing Data Subscriptions", „Consider Transport Configuration")</li>
        <li><strong>Collect</strong> klicken → Scenario Tree wird aufgebaut</li>
        <li>Tab <strong>Object Relations → Selection to Generate Data Subscriptions</strong>: Subscriptions prüfen und individuell anpassen (Description, Extraction Mode, Selections, Projections, Package)</li>
        <li><strong>Mode</strong> wählen (empfohlen: „Activate in Background")</li>
        <li><strong>Generate</strong> klicken → alle Subscriptions werden auf einmal erzeugt</li>
        <li>Ergebnisse im Tab <strong>Messages</strong> prüfen</li>
      </ol>

      <div class="callout callout-warn">
        <strong>⚠️ Warnung – gleiches Target:</strong> Alle Subscriptions in einem Scenario müssen <strong>dasselbe Target</strong> haben!
      </div>
	  <div class="callout callout-warn">
        <strong>⚠️ Activation Mode:</strong> „Activate Directly" verbraucht viel Rechenleistung → besser <strong>„Activate in Background"</strong> wählen.<br>
        <span class="source-tag">Quelle: SAP Help – „Generating Data Subscriptions"</span>
      </div>
	  <div class="callout callout-warn">
        <strong>⚠️ Wichtig – Run nicht in BWMT möglich:</strong> Nach dem Generieren müssen die Subscriptions über die <strong>Transaktion <code>RSDPS</code></strong> ausgeführt werden (siehe Phase 2). Das Ausführen (Run) ist in der BWMT nicht möglich.<br>
        <span class="source-tag">Quelle: SAP Help – „Generating Data Subscriptions", „BW Data Product Generator Perspective in BW Modeling Tools (BWMT)"</span>
	  </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Vorteile gegenüber RSDPS:</strong> Mass-Generierung aller Subscriptions inkl. Abhängigkeiten, Mass-Aktivierung, Package-Zuweisungen für alle Subscriptions auf einmal, Wiederverwendung bestehender Subscriptions.
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Performance-Optimierung:</strong> Bei großen Datenmengen können folgende RSADMIN-Parameter über Report <code>SAP_RSADMIN_MAINTAIN</code> (SE38) angepasst werden:<br>
        • <code>RSDDS_PACKSIZE_CSV</code> – Package-Größe (Default: 50 MB)<br>
        • <code>RSDDS_PARALLEL_LOAD = X</code> – Parallele Verarbeitung aktivieren (ab DPG 3.0 per Default aktiv)<br>
        Data Subscription Runs werden über den Queued Task Manager (QTM) verarbeitet, der bis zu 75% der Batch-Prozesse nutzt (konfigurierbar, siehe SAP Note 3675751).<br>
        <span class="source-tag">Quelle: SAP Note 3590400 – "Optimizing Data Subscription Performance"</span>
      </div>
	  `},
{id:"s12",title:"1.2 Optionale Einstellungen",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">BWMT (vor Generate) oder RSDPS</span>
      <div class="step-goal">Ziel: Die Extraktion feinjustieren (Felder, Filter, Delta, Scheduling).</div>
      <p>Diese Einstellungen können <strong>vor dem Generieren</strong> im Scenario Generator (Schritt 1.1, Punkt 8) oder <strong>nach dem Erstellen</strong> im Edit-Modus der Transaktion <code>RSDPS</code> vorgenommen werden:</p>
      <table class="data">
        <tr><th>Einstellung</th><th>Beschreibung</th><th>Hinweis</th></tr>
        <tr><td><strong>Extraction Mode</strong></td><td><code>Full</code> oder <code>Delta</code></td><td>Delta = inkrementelle Extraktion</td></tr>
        <tr><td><strong>Scheduling</strong></td><td><code>No Scheduling</code> (manuell) oder <code>Process Chain</code></td><td>Bei Process Chain: Variant angeben</td></tr>
        <tr><td><strong>Selections</strong></td><td>Datenset einschränken (Filter auf Felder)</td><td>Reduziert Datenvolumen</td></tr>
        <tr><td><strong>Projections</strong></td><td>Felder auswählen / abwählen</td><td>Key-Felder sind immer Pflicht</td></tr>
      </table>

      <div class="callout callout-danger">
        <strong>⚠️ Kritisches Zeitfenster für Änderungen:</strong><br>
        <strong>Vor dem ersten Run:</strong> Description, Extraction Mode, Scheduling, Selection, Projection änderbar.<br>
        <strong>Nach dem ersten Run:</strong> Nur noch <strong>Description</strong> änderbar – alles andere wird <strong>read-only</strong>!<br>
        Nachträgliche Änderungen sind <strong>nur über <code>RSDPS</code></strong> möglich (nicht in der BWMT Data Subscriptions View).<br>
        <span class="source-tag">Quelle: SAP Help – „Editing Data Subscriptions"</span>
      </div>

      <div class="callout callout-warn">
        <strong>⚠️ Process Chain Type:</strong> Muss sein: <strong>Load Process and Postprocessing → Data Provisioning Subscription</strong>.<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions in the SAP GUI"</span>
		`},
{id:"s13",title:"1.3 Manuell in RSDPS",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
        <span class="badge badge-optional">Alternative zu 1.1</span>
        <span class="badge badge-tool">RSDPS</span>
      </div>
      <div class="step-goal">Ziel: Eine einzelne Extraktionsdefinition für einen BW InfoProvider erstellen – ohne Scenario Generator.</div>
      <p><strong>Vorgehen in <code>RSDPS</code> (SAP GUI):</strong></p>
      <ol>
        <li>Transaktion <code>RSDPS</code> aufrufen</li>
        <li>Button <strong>Create</strong> klicken</li>
        <li><strong>Source Name:</strong> BW InfoProvider auswählen (aDSO, CompositeProvider, InfoObject, MultiProvider, InfoCube oder Query) – Source Type wird automatisch auf <strong>ODP</strong> gesetzt</li>
        <li><strong>Target Name:</strong> Das konfigurierte Target auswählen – Target Type wird automatisch auf <strong>HDLFS</strong> gesetzt</li>
        <li><strong>Save</strong> klicken</li>
        <li><strong>Package</strong> auswählen</li>
      </ol>
      <div class="callout callout-danger">
        <strong>⚠️ Package-Warnung:</strong> Standardmäßig wird <code>$TMP</code> zugewiesen (= lokal, <strong>nicht transportierbar</strong>). Für produktive Szenarien unbedingt ein transportierbares Package wählen!<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions in the SAP GUI"</span>
      
      <p><strong>Was wird automatisch generiert:</strong></p>
      <ul>
        <li>Technischer Name (nicht änderbar)</li>
        <li>Beschreibung (basierend auf InfoProvider, änderbar)</li>
        <li>Zeitstempel, Ersteller, Owner</li>
        <li>Target-Informationen: Techn. Name der Local Table, File Path, CSV-Eigenschaften</li>
      </ul>
      <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions in the SAP GUI"</span>
	  `},
{id:"s14",title:"1.4 Aus Template erstellen",phase:"Phase 1 – Subscriptions",color:"#0070f2",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS</span>
      </div>
      <div class="step-goal">Ziel: Schnellere Erstellung durch Kopie einer bestehenden Subscription.</div>
      <ol>
        <li>Bestehende Subscription in der RSDPS-Liste auswählen</li>
        <li><strong>Create from Template</strong> klicken</li>
        <li>Optional: Source, Target, Extraction Mode, Scheduling anpassen</li>
        <li>Save</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> Auch wenn das Template vom Typ SUBS ist, wird die neue Subscription automatisch als <strong>DSUB</strong> erstellt (= transportierbar).<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions from Template"</span>
		`},
{id:"s21",title:"2.1 Aktivieren",phase:"Phase 2 – Aktivieren",color:"#188918",
 content:`
        <span class="badge badge-pflicht">Pflicht</span>
        <span class="badge badge-tool">BWMT oder RSDPS</span>
      </div>
      <div class="step-goal">Ziel: Subscription ausführbar machen und Local Table (File) in Datasphere erstellen.</div>

      <p><strong>Option A – Über BWMT (empfohlen bei vielen Subscriptions):</strong></p>
      <ul>
        <li>In der <strong>Data Subscriptions View</strong>: Eine oder mehrere Subscriptions auswählen (via <code>CTRL + Click</code>)</li>
        <li>Rechtsklick → <strong>Activate</strong></li>
        <li>Vorteil: <strong>Mass-Aktivierung</strong> mehrerer Subscriptions auf einmal möglich</li>
      </ul>

      <p style="margin-top:0.7rem"><strong>Option B – Über RSDPS:</strong></p>
      <ul>
        <li>Data Subscription auswählen → <strong>Edit</strong> → <strong>Activate Data Subscription</strong></li>
      </ul>

      <p style="margin-top:0.7rem"><strong>Was passiert bei der Aktivierung:</strong></p>
      <ul>
        <li>Status wechselt von <strong>Inactive → Active</strong></li>
        <li>SAP Datasphere-Entity wird <strong>asynchron</strong> erstellt und deployed</li>
        <li><strong>Local Table (File)</strong> Standardmäßig leitet das System den technischen Namen automatisch aus dem ausgewählten Quellobjekt (InfoProvider) ab. Indem Sie einen benutzerdefinierten technischen Namen festlegen, können Sie das Standardverhalten ändern und beim Anlegen des Datenabonnements eine aussagekräftige ID Ihrer Wahl eingeben</li>
        <li>Semantics Usage Type: <strong>Local Table (Fact)</strong></li>
      </ul>
      <div class="callout callout-info">
        <strong>ℹ️ Versionen:</strong> Data Subscriptions haben eine <strong>M (Modified)</strong> und <strong>A (Active)</strong> Version. Bei Änderungen muss erneut aktiviert werden, damit A = M. Transport ist nur möglich wenn A = M.<br>
        <span class="source-tag">Quelle: SAP Help – „Transporting and Migrating Data Subscriptions"</span>
      </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Local Table:</strong> Mit dem SAP Hinweis 3724724 (Data Subscriptions 4.0) ist es möglich den technischen Namen der Local Table in Datasphere zu vergeben. Es ist auch möglich bestehende Subcriptionen (vor 4.0 erstellt) zu migrieren und im Nachgang einen technsichen Namen zu vergeben.<br>
        🔗 <a href="https://help.sap.com/docs/SAP_BW4HANA/ed919380760a44388ab90e6bb3e7480a/87a6fd1da8cd44509e77c232f39c8449.html?locale=en-US" target="_blank" style="color:var(--sap-blue)">Siehe SAP BW/4 Help - Local Tables</a>
      </div>	  
      `},
{id:"s22",title:"2.2 Ausführen",phase:"Phase 2 – Aktivieren",color:"#188918",
content:`
        <span class="badge badge-pflicht">Pflicht</span>
        <span class="badge badge-tool">RSDPS (manuell) oder Process Chain (eingeplant)</span>
      </div>
      <div class="step-goal">Ziel: Die tatsächliche Datenextraktion durchführen.

      <p><strong>Option A – Manuell über RSDPS:</strong></p>
      <ol>
        <li>Transaktion <code>RSDPS</code> öffnen</li>
        <li>Data Subscription in der Liste auswählen</li>
        <li><strong>Run</strong> klicken</li>
      </ol>

      <p style="margin-top:0.7rem"><strong>Option B – Automatisch über Process Chain:</strong></p>
      <ul>
        <li>Wenn die Subscription auf Scheduling „Process Chain" konfiguriert ist, wird die Extraktion <strong>über die Prozesskette</strong> ausgelöst (z.B. zeitgesteuert oder nach einem vorgelagerten Ladeschritt)</li>
        <li>Die Konfiguration der Process Chain erfolgt über <code>RSA1</code> oder <code>RSPC1</code> (siehe Phase 3)</li>
      </ul>

      <p style="margin-top:0.7rem"><strong>Ergebnis:</strong> Daten werden aus dem BW InfoProvider in die Local Table (File) extrahiert. Bei Delta-Modus nur geänderte Daten.</p>
      <span class="source-tag">Quelle: SAP Help – „RSDPS Transaction in SAP GUI" → Abschnitt „Actions for Data Subscriptions"</span>
	`},
{id:"s23",title:"2.3 Ergebnis prüfen",phase:"Phase 2 – Aktivieren",color:"#188918",content:`
        <span class="badge badge-empfohlen">Empfohlen</span>
        <span class="badge badge-tool">RSDPS + ggf. RSA1</span>
      </div>
      <div class="step-goal">Ziel: Erfolg der Extraktion verifizieren.</div>

      <p><strong>In RSDPS (für manuelle und eingeplante Runs):</strong></p>
      <ul>
        <li>Die Spalte <strong>Last Run</strong> in der Subscriptions-Liste zeigt den Status des letzten Laufs – unabhängig davon, ob manuell oder per Kette ausgelöst</li>
        <li><strong>Runtime</strong> klicken → Detailinformationen zum letzten Run</li>
        <li><strong>Browse</strong> klicken → Daten in der Local Table (File) anzeigen</li>
        <li><strong>Check</strong> klicken → Potenzielle Probleme erkennen (Source, Target, Verbindung, Local Table)</li>
      </ul>

      <div class="callout callout-info">
        <strong>ℹ️ Bei eingeplanten Runs (Process Chain):</strong> Für das detaillierte Log (Dauer, Fehlermeldungen, Einzelschritte) empfiehlt sich zusätzlich das <strong>Prozesskettenlog</strong> in <code>RSA1</code> → Monitoring oder im Process Chain Editor des BW/4HANA Cockpits.<br>
      
      <table class="data">
        <tr><th>Status</th><th>Bedeutung</th></tr>
        <tr><td>🟢 Last Run Successful</td><td>Extraktion erfolgreich</td></tr>
        <tr><td>🔴 Last Run Failed</td><td>Extraktion fehlgeschlagen</td></tr>
        <tr><td>⚪ Not Run</td><td>Noch nicht ausgeführt</td></tr>
      </table>
      <span class="source-tag">Quelle: SAP Help – „RSDPS Transaction in SAP GUI" → Abschnitt „Columns and Values"</span>
	  `},
{id:"s31",title:"3.1 Process Chain",phase:"Phase 3 – Automatisierung",color:"#7c6bbf",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS + RSA1/RSPC1</span>
      </div>
      <div class="step-goal">Ziel: Extraktion automatisiert und zeitgesteuert ausführen.</div>
      <ol>
        <li>In <code>RSA1</code> oder <code>RSPC1</code>: <strong>Neue Process Chain anlegen</strong> oder einen neuen Schritt in eine <strong>bestehende Process Chain einfügen</strong></li>
        <li>Process Type: <strong>Load Process and Postprocessing → Data Provisioning Subscription</strong></li>
        <li>Neue <strong>Process Variant</strong> anlegen (noch leer, ohne Subscriptions)</li>
        <li>In <code>RSDPS</code>: Subscription bearbeiten → Scheduling auf „Process Chain" → Variant zuweisen</li>
        <li>Subscription aktivieren</li>
        <li>In RSA1: Variant prüfen → Subscription sollte jetzt erscheinen</li>
        <li>Process Chain ausführen</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Warnung – leere Variant:</strong> Die Process Variant wird zunächst <strong>leer</strong> angelegt. Subscriptions werden durch Zuweisung <em>in der Subscription selbst</em> mit der Variant verknüpft – nicht umgekehrt!<br>
      <span class="source-tag">Quelle: SAP Help – „Scheduling Data Subscriptions With Process Chains"</span>
	  </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Bestehende Ketten:</strong> Der DPG-Schritt muss nicht zwingend in einer neuen Process Chain stehen. Er kann als <strong>zusätzlicher Schritt in eine bereits vorhandene Ladekette</strong> integriert werden – z.B. direkt nach dem Laden der Daten in den InfoProvider, um die Extraktion in den Object Store automatisch anzuschließen.<br>
        <span class="source-tag">Quelle: SAP Help – „Scheduling Data Subscriptions With Process Chains"</span>
      </div>
	  <div class="callout callout-info">
        <strong>ℹ️ Technical User empfohlen:</strong> Für Process Chains und Transporte empfiehlt SAP, die OAuth-Konfiguration auf einen <strong>Technical User</strong> in Datasphere umzustellen (statt Interactive Usage). Dies vereinfacht die Authentifizierung und ist Voraussetzung für Background-Runs. Details siehe SAP Note 3590400, Kapitel „Switching the OAuth Configuration to a Technical User“.<br>
        <span class="source-tag">Quelle: SAP Note 3590400 – "Configuring the Data Product Generator"</span>
      </div>       
      `},
{id:"s32",title:"3.2 Task Chains",phase:"Phase 3 – Automatisierung",color:"#7c6bbf",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS + Datasphere</span>
      </div>
      <div class="step-goal">Ziel: End-to-End-Automatisierung BW ↔ Datasphere (z.B. Merge-Task nach Extraktion).</div>
      <ol>
        <li>In Datasphere: Task Chain erstellen (auch im BW File Space möglich)</li>
        <li>In BW: Process Chain erstellen/bearbeiten und neuen Schritt einfügen</li>
        <li>Process Type: <strong>General Services → Task Chain</strong></li>
        <li>Target, Space und Task Chain angeben</li>
        <li>Speichern, Aktivieren, Ausführen</li>
      </ol>
      <div class="callout callout-warn">
        <strong>⚠️ Voraussetzung:</strong> Die Integration von Task Chains in Process Chains ist nur sinnvoll, wenn die zugehörige Data Subscription <strong>eingeplant (Scheduling = Process Chain)</strong> ist – nicht auf manueller Ausführung steht. Andernfalls wird die Task Chain nie automatisch ausgelöst.<br>
        <span class="source-tag">Quelle: SAP Help – „Running Task Chains in Process Chains"</span>      
      <span class="source-tag">Quelle: SAP Help – „Running Task Chains in Process Chains"</span>
	  `},
{id:"s41",title:"4.1 Local Table teilen",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
        <span class="badge badge-optional">Optional – nur für Reporting/Modellierung</span>
      </div>
      <div class="step-goal">Ziel: Extrahierte Daten für Modellierung und Reporting in Datasphere verfügbar machen. Nicht erforderlich, wenn das Ziel ausschließlich die Weitergabe als Data Product via Delta Sharing ist.</div>
      <ul>
        <li>Local Table liegt im <strong>BW File Space</strong> (read-only, Object Store / HDLFS)</li>
        <li>Per <strong>Sharing</strong> an andere Spaces weitergeben → dort für Modellierung auf HANA-Ebene verwenden</li>
        <li>Struktur der Local Table kann nicht geändert werden, solange die Subscription existiert</li>
      </ul>
      <div class="callout callout-info">
        <strong>ℹ️ Wann ist dieser Schritt nötig?</strong> Nur wenn die BW-Daten in Datasphere für analytische Modelle, Views oder SAC-Stories genutzt werden sollen. Für den reinen <strong>Data-Product-/Delta-Sharing-Pfad</strong> (Schritt 4.2 + 4.3) kann das Data Product direkt aus dem BW File Space erstellt werden – ein Sharing an einen anderen Space ist dann nicht erforderlich.
         <span class="source-tag">Quelle: SAP Help – „Creating Data Subscriptions"</span>
		 `},
{id:"s42",title:"4.2 Data Product erstellen",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
        <span class="badge badge-pflicht">Pflicht (für Data Product-Szenario)</span>
      </div>
      <div class="step-goal">Ziel: Aus der Local Table im BW File Space ein custom Data Product erstellen und im Catalog listen.</div>
      <p><strong>Voraussetzung:</strong> Ein <strong>Formations Profile</strong> muss im Data Sharing Cockpit angelegt sein (Visibility: „Formations"). Siehe SAP Help – „Creating Custom Delta Share Data Products - Creating Formations Profile".</p>
      <p><strong>Vorgehen in SAP Datasphere:</strong></p>
      <ol>
        <li><strong>Data Sharing Cockpit → My Data Products</strong> öffnen</li>
        <li><strong>Create Product</strong> klicken</li>
        <li><strong>Business Name</strong> eingeben (z.B. „Sales Orders") – Technical Name wird automatisch generiert</li>
        <li>Im Abschnitt <strong>Overview</strong>: Beschreibung eingeben</li>
        <li>Im Abschnitt <strong>Product Details</strong>: <strong>Data Category</strong> auswählen (z.B. „Company Data") – Felder Contexts, Delivery Mode und Contract Type werden automatisch gesetzt (Formations / Delta Share / Free)</li>
        <li>Im Abschnitt <strong>Product Artifacts</strong>: Den <strong>BW File Space</strong> als Product Artifact Space auswählen</li>
        <li>Über das <strong>Plus-Icon</strong> die gewünschte <strong>Local Table (File)</strong> hinzufügen und bestätigen</li>
        <li><strong>Save Changes</strong> klicken</li>
        <li><strong>Switch Status → List</strong> wählen, um das Data Product im Catalog zu listen</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> Dieser Schritt findet komplett in <strong>SAP Datasphere</strong> statt. Das Data Product ist ein <strong>Custom Data Product</strong>, das von der eigenen Organisation verwaltet wird (nicht von SAP). Nach dem Listen erscheint es im Catalog in Datasphere und im BDC Cockpit.<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Products (Data Sharing Cockpit)"</span>
      </div>
      <div class="callout callout-warn">
        <strong>⚠️ Synchronisierung:</strong> Es kann etwas dauern, bis das Data Product im Catalog erscheint, da die Systeme zuerst synchronisieren müssen. Bei Bedarf kann der Catalog-Administrator eine manuelle Synchronisierung anstoßen.<br>
        <span class="source-tag">Quelle: SAP Help – „Creating Data Products (Data Sharing Cockpit)"</span>
      </div>
      <div class="callout callout-info">
        <strong>ℹ️ Roadmap – Automatisierung geplant:</strong> Laut SAP Roadmap ist geplant, die manuelle Data-Product-Erstellung aus der Local Table zukünftig zu automatisieren. Dieser Schritt wird damit perspektivisch obsolet.<br>
        🔗 <a href="https://roadmaps.sap.com/board?PRODUCT=73555000100800004851&range=CURRENT-LAST#;INNO=000D3AAC9DD21FD0A4C203167B3998EE" target="_blank" style="color:var(--sap-blue)">SAP Roadmap Item ansehen</a>
		`},
{id:"s43",title:"4.3 BDC Connect (Delta Share)",phase:"Phase 4 – Data Products",color:"#cc1919",
 content:`
        <span class="badge badge-optional">Optional</span>
      </div>
      <div class="step-goal">Ziel: Das gelistete BW Data Product via Delta Sharing an Databricks/Snowfalke/MS-Fabrics(Q3-2026)/Google BigQuery(Q4-2026) weitergeben – für AI/ML- und Advanced-Analytics-Szenarien.</div>
      <p><strong>Voraussetzung:</strong> Externe Tool muss über SAP BDC Connect angebunden sein.</p>
      <p><strong>Vorgehen im SAP Business Data Cloud Cockpit:</strong></p>
      <ol>
        <li><strong>Catalog &amp; Marketplace → Search</strong> öffnen</li>
        <li>Das erstellte BW Data Product suchen und Details-Seite öffnen</li>
        <li><strong>Share</strong> klicken → <strong>Manage Access</strong>-Dialog öffnet sich</li>
        <li><strong>Target System:</strong> Das externe Tool auswählen</li>
        <li><strong>Share Name</strong> eingeben (nur Kleinbuchstaben, nachträglich nicht änderbar)</li>
        <li><strong>Workspace</strong> im externen Tool auswählen (ein oder mehrere)</li>
        <li><strong>Share</strong> klicken</li>
      </ol>
      <p style="margin-top:0.7rem"><strong>Ergebnis:</strong> Das Data Product ist im externen Tool verfügbar (SAP Databricks: <strong>Delta Table im Unity Catalog</strong> (Ordner: Delta Share Received) ). Von dort können Notebooks für Data Preparation, Training, Forecasting etc. erstellt werden. Die Ergebnisse können als Data Product zurück in den BDC Catalog geteilt werden.</p>
      <div class="callout callout-info">
        <strong>ℹ️ Zero-Copy Sharing:</strong> Delta Sharing teilt Daten live über Plattformen, Clouds und Regionen hinweg – ohne die Daten zu kopieren oder zu verschieben.<br>
        <span class="source-tag">Quelle: SAP Help – „Sharing Data Products to SAP Databricks"</span>
		`},
{id:"s51",title:"5.1 SUBS → DSUB",phase:"Phase 5 – Transport",color:"#6b7280",
 content:`
        <span class="badge badge-optional">Optional (falls alte Subscriptions vorhanden)</span>
        <span class="badge badge-tool">RSDPS / SE38</span>
      </div>
      <div class="step-goal">Ziel: Bestehende lokale Subscriptions transportierbar machen.</div>
      <ol>
        <li><code>SE38</code> → Report <code>RSDDS_DSUB_MIGRATION</code> ausführen</li>
        <li>Zu migrierende Subscriptions auswählen</li>
        <li>Transport Request und Package angeben</li>
        <li>Optional: <strong>Enable Simulation</strong> für Probelauf</li>
        <li>Ausführen</li>
      </ol>
      <div class="callout callout-info">
        <strong>ℹ️</strong> Alle neuen Subscriptions werden automatisch als DSUB erstellt.<br>
        <span class="source-tag">Quelle: SAP Help – „Migrating Data Subscriptions from SUBS to DSUB"</span>
		`},
{id:"s52",title:"5.2 Transport-Voraussetzungen",phase:"Phase 5 – Transport",color:"#6b7280",
 content:`
        <span class="badge badge-pflicht">Pflicht (für Transport)</span>
      
      <table class="data">
        <tr><th>Voraussetzung</th><th>Details</th></tr>
        <tr><td>Typ</td><td><strong>DSUB</strong> (nicht SUBS)</td></tr>
        <tr><td>Status</td><td><strong>A (Active)</strong> – M und A müssen gleich sein</td></tr>
        <tr><td>Package</td><td>Nicht <code>$TMP</code></td></tr>
        <tr><td>Transport Request</td><td>Muss zugewiesen sein</td></tr>
      </table>
      <span class="source-tag">Quelle: SAP Help – „Transporting Data Subscriptions"</span>
	  `},
{id:"s61",title:"6.1 Einzeln löschen",phase:"Phase 6 – Löschen",color:"#6b7280",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS oder BWMT</span>
      <ul>
        <li><strong>RSDPS:</strong> Subscription auswählen → <strong>Delete</strong> (einzeln)</li>
        <li><strong>BWMT Data Subscriptions View:</strong> Eine oder mehrere Subscriptions auswählen → Rechtsklick → <strong>Delete</strong> (Mass-Delete möglich)</li>
        <li>Local Table (File) wird <strong>NICHT</strong> automatisch gelöscht → muss manuell in Datasphere entfernt werden</li>
        <li>Nach Löschen der Subscription verliert die Local Table ihr read-only-Flag</li>
      </ul>
      <span class="source-tag">Quelle: SAP Help – „Deleting Data Subscriptions", „Deleting Dependent Objects"</span>
	  `},
{id:"s62",title:"6.2 Mass Delete",phase:"Phase 6 – Löschen",color:"#6b7280",
 content:`
        <span class="badge badge-optional">Optional</span>
        <span class="badge badge-tool">RSDPS / SE38</span>
      </div>
      <ul>
        <li><code>SE38</code> → Report <code>RSDDS_DELETE_BY_SOURCE</code></li>
        <li>Oder: <code>RSDPS</code> → <strong>Goto → Delete Data Subscriptions by Target</strong></li>
        <li>Optionen: <strong>Simulate Deletion</strong> (Probelauf), <strong>Force Deletion</strong> (ignoriert Fehler)</li>
      </ul>
      <div class="callout callout-danger">
        <strong>⚠️ Warnung bei Force Deletion:</strong> Wenn die Datasphere-Verbindung während der Löschung nicht funktioniert, behalten die Local Tables ggf. ihr read-only-Flag und können danach nicht mehr gelöscht werden!<br>
        <span class="source-tag">Quelle: SAP Help – „Mass Deleting Data Subscriptions by Target"</span>
		`},
{id:"happypath",title:"Happy Path",phase:null,color:"#333",
 content:`
 <h2 id="happypath">✅ Minimal-Workflow (Happy Path)</h2>
    <ol>
      <li>Voraussetzungen prüfen (BW 7.5 SP24+, BWPCE, Datasphere mit Object Store)</li>
      <li>SAP Notes einspielen (<code>3593519</code>, <code>3590400</code>)</li>
      <li>DPG konfigurieren (<code>SAP_BW_BDC_CONFIGURATION</code>)</li>
      <li>Target anlegen (<code>RSDPS</code> → Goto → Maintain Target System)</li>
      <li>Data Subscriptions generieren (BWMT Scenario Generator oder <code>RSDPS</code> → Create)</li>
      <li><em>Optional:</em> Extraction Mode, Selection, Projection anpassen</li>
      <li>Data Subscriptions <strong>aktivieren</strong> (BWMT oder <code>RSDPS</code>)</li>
      <li>Data Subscriptions <strong>ausführen</strong> (<code>RSDPS</code> → Run)</li>
      <li>Ergebnis prüfen (<code>RSDPS</code> → Runtime / Browse)</li>
      <li>In Datasphere: <em>Optional:</em> Local Table an anderen Space sharen (nur für Reporting)</li>
      <li>In Datasphere: Data Product im Data Sharing Cockpit erstellen → Status auf „Listed"</li>
      <li><em>Optional:</em> Im BDC Cockpit: Data Product via Delta Sharing an Databricks teilen</li>
    </ol>
	`},
{id:"questions",title:"Klärungsfragen",phase:null,color:"#333",
 content:`
 <h2 id="questions">❓ Klärungsfragen</h2>
    <ol>
      <li><strong>Lizenzierung:</strong> Läuft das BW 7.5 als BWPCE in SAP BDC? <em>(Pflichtvoraussetzung!)</em></li>
      <li><strong>SP-Level:</strong> Ist mindestens SP24 eingespielt?</li>
      <li><strong>Object Store:</strong> Ist der Object Store in Datasphere bereits aktiviert?</li>
      <li><strong>SAP Notes:</strong> Sind Notes 3593519 und 3590400 bereits eingespielt?</li>
      <li><strong>Zertifikate:</strong> Sind SSL-Zertifikate in STRUST korrekt hinterlegt?</li>
      <li><strong>InfoProvider:</strong> Welche sollen initial repliziert werden? (aDSOs, CompositeProvider, Queries?)</li>
      <li><strong>Delta oder Full?</strong> Ist inkrementelle Extraktion gewünscht?</li>
      <li><strong>Transport:</strong> Sollen Subscriptions zwischen DEV/QAS/PRD transportiert werden?</li>
      <li><strong>Automatisierung:</strong> Soll die Extraktion per Process Chain gesteuert werden?</li>
      <li><strong>Databricks:</strong> Ist Databricks-Integration (Delta Sharing) ein Thema?</li>
      <li><strong>Multiple BW-Systeme:</strong> Falls mehrere BW-Systeme vorhanden sind – sollen diese in denselben oder getrennte Datasphere Spaces schreiben? (Ob mehrere BW-Systeme technisch denselben Space nutzen können, ist von SAP nicht explizit dokumentiert und sollte mit SAP geklärt werden.)</li>
    </ol>
	`},

{id:"bw75",title:"BW 7.5 Specifics",phase:null,color:"#333",
 content:`
 <div class="system-alert" id="bw75">
    <table>
      <tr><td>UI</td><td>No BW/4HANA Cockpit → use <strong>Transaction RSDPS</strong> in SAP GUI only </td></tr>
